      function changeCarPos(distanceTravelled, carID) {
        if (!(startedGame)){
          if (carID == "myCar"){
            carID = "oppCar"
          } else{
            carID = "myCar"
          }
        }
        var total = 250
        var  track = document.getElementById("track");
        var  trackLength = track.getTotalLength();
        console.log(trackLength + " " + distanceTravelled)
        var  distanceOnTrack = trackLength * distanceTravelled / total;
        console.log(Math.round(distanceOnTrack))
        var  pos = track.getPointAtLength(Math.round(distanceOnTrack));
        // Calculate position a little ahead of the car (or behind if we are at the end), so we can calculate car angle
        if (distanceOnTrack + 1 <= trackLength) {
          var  posAhead = track.getPointAtLength(distanceOnTrack + 1);
          var  angle = Math.atan2(posAhead.y - pos.y, posAhead.x - pos.x);
        } else {
          var  posBehind = track.getPointAtLength(distanceOnTrack - 1);
          var  angle = Math.atan2(pos.y - posBehind.y, pos.x - posBehind.x);
        }
        var angInDeg = radiansToDegrees(angle)
        if (prevRotation < 180 && (angInDeg > (prevRotation + 180))){
          angInDeg -= 360;
        } else if ( prevRotation >= 180 && (angInDeg <= (prevRotation - 180))){
          angInDeg += 360;
        }
        // Position the car at "pos" totated by "angle"
        var  car = document.getElementById(carID);
        if (carID == "myCar"){
          car.setAttribute("transform", "translate(" + pos.x + "," + pos.y + ") rotate(" + angInDeg + ") scale(0.15)");
        } else{
          if (distanceTravelled >= 0 && distanceTravelled <= 50){
            car.setAttribute("transform", "translate(" + pos.x + "," + Math.max(0, pos.y-33) + ") rotate(" + angInDeg + ") scale(0.15)");
          } else if (distanceTravelled > 50 && distanceTravelled <= 80){
            car.setAttribute("transform", "translate(" + (pos.x + 33) + "," + pos.y + ") rotate(" + angInDeg + ") scale(0.15)");
          } else if (distanceTravelled > 80 && distanceTravelled <= 105){
            car.setAttribute("transform", "translate(" + pos.x + "," + (pos.y + 33) + ") rotate(" + angInDeg + ") scale(0.15)");
          } else if (distanceTravelled > 105 && distanceTravelled <= 120){
            car.setAttribute("transform", "translate(" + Math.max(0, pos.x - 33) + "," + pos.y + ") rotate(" + angInDeg + ") scale(0.15)");
          } else if (distanceTravelled > 120 && distanceTravelled <= 138){
            car.setAttribute("transform", "translate(" + pos.x + "," + (pos.y + 33) + ") rotate(" + angInDeg + ") scale(0.15)");
          } else if (distanceTravelled > 138 && distanceTravelled <= 149){
            car.setAttribute("transform", "translate(" + Math.max(0, pos.x - 33) + "," + pos.y + ") rotate(" + angInDeg + ") scale(0.15)");
          } else if (distanceTravelled > 149 && distanceTravelled <= 163){
            car.setAttribute("transform", "translate(" + pos.x + "," + (pos.y + 33) + ") rotate(" + angInDeg + ") scale(0.15)");
          } else if (distanceTravelled > 163 && distanceTravelled <= 197){
            car.setAttribute("transform", "translate(" + (pos.x + 33) + "," + pos.y + ") rotate(" + angInDeg + ") scale(0.15)");
          } else if (distanceTravelled > 197 && distanceTravelled <= 239){
            car.setAttribute("transform", "translate(" + (pos.x - 33) + "," + pos.y + ") rotate(" + angInDeg + ") scale(0.15)");
          } else if (distanceTravelled >= 239){
            car.setAttribute("transform", "translate(" + pos.x + "," + Math.max(0, pos.y-33) + ") rotate(" + angInDeg + ") scale(0.15)");
          }
        }
        prevRotation = angInDeg
      }

          var timeValid = true
        }
        if (gameConnected && timeValid){
          msg = [player2, document.getElementById('MaxTime').value, document.getElementById('mode').value]
          modeChosen = gameVals.indexOf(msg[2])
          if (modeChosen === 0 || modeChosen == 3){
            var randomWord = words[Math.floor(Math.random()*words.length)]
            startTheGame(randomWord, msg)
            socket.emit("startingQuestion", [player2, randomWord]);
            if (modeChosen != 3){
              document.getElementById('boost').value = boost;
              var div = document.createElement("div");
              var divContent = (`<button class="info" onclick="customAlert('Type a word similar to the word in dark blue, and the person who does not run out of time wins! Your bar at the bottom fills up faster the more closely related the word is - when it is full, you get 20 more seconds!', '#ff8c00')">?</button>`);
              div.innerHTML = (divContent)
              document.body.appendChild(div);
            } else{
              startedGame = true
              changeCarPos(0, "myCar")
              changeCarPos(0, "oppCar")
              startTime = new Date();
              var div = document.createElement("div");
              var divContent = (`<button class="info" onclick="customAlert('Type a word similar to the word in dark blue as fast as possible - the faster you write, the further you go! The bar at the bottom shows time left until you move no further. You are the <u>Red</u> car.', '#ff8c00')">?</button>`);
              div.innerHTML = (divContent)
              document.body.appendChild(div);
              var seconds = 10;
              timer = setInterval(function(){
                if(seconds <= 0){
                  clearInterval(timer);
                }
                document.getElementById("tenstimer").value = seconds;
                seconds -= 0.01;
              }, 10);
            }
          } else if (modeChosen === 1){
            var div = document.createElement("div");
            var divContent = (`<button class="info" onclick="customAlert('Type the capital of the country in dark blue, and the person who does not run out of time wins!', '#ff8c00')">?</button>`);
            div.innerHTML = (divContent)
            document.body.appendChild(div);
            startTheGame(countries[Math.floor(Math.random()*countries.length)], msg)
          } else if (modeChosen == 2){
            var div = document.createElement("div");
            var divContent = (`<button class="info" onclick="customAlert('Type the correct definition to the term in dark blue, and the person who does not run out of time wins!', '#ff8c00')">?</button>`);
            div.innerHTML = (divContent)
            document.body.appendChild(div);
            if (terms.length != 0 && definitions.length != 0){
              socket.emit("termsAndDefs", [player2, terms, definitions]);
              startTheGame(terms[Math.floor(Math.random()*terms.length)], msg)
            } else{
              customAlert("Please enter terms to use the language mode.", "red")
            }
          }
          
          
        } else{
          if (!timeValid){
            customAlert("Enter a time for each player for this game mode.", "red")
          } else{
            customAlert("Oops, forgot to connect another player!", "red")
          }
        }
      }

      socket.on("storeStartQ", (question) => {
        usedWords.push(question)
      })
		</script>
